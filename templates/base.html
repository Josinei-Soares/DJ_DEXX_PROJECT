{% load static %}
<!doctype html>
<html lang="pt_br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- icone da aba -->
    <link
      rel="shortcut icon"
      href=" {% static 'img/logo.jpg'%}"
      type="image/x-icon"
    />
    <!-- link para folha de stilo do menu -->
    <link rel="stylesheet" href="{% static 'css/menu.css'%}" />
    <!-- link para stilo rodapé -->
    <link rel="stylesheet" href="{% static 'css/rodape.css'%}" />
    <!-- link para stilo seção sobre -->
    <link rel="stylesheet" href="{% static 'css/secao-sobre.css'%}" />
    <!-- link para stilo seção rede sociais -->
    <link rel="stylesheet" href="{% static 'css/redes-sociais.css'%}" />
    <!-- link para stilo seção agenda -->
    <link rel="stylesheet" href="{% static 'css/secao-agenda.css'%}" />
    <!-- link para stilo video de fundo -->
    <link rel="stylesheet" href="{% static 'css/secao-video.css'%}" />
    <!-- carrossel -->
    <link rel="stylesheet" href="{% static 'css/carrossel.css'%}" />
    <!-- video -->
    <link rel="stylesheet" href="{% static 'css/video.css'%}" />
    <!-- link seção contado -->
    <link rel="stylesheet" href="{%  static 'css/contatos.css'%}" />
    <!-- link icon do boostrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- link para stilo galeria -->
    <link rel="stylesheet" href="{% static 'css/galeria.css'%}" />

    <title>{% block title %}DJ DEXX{% endblock %}</title>
  </head>
  <body>
    {% include 'menu.html' %}

    <main>{% block content %} {% endblock %}</main>

    {% include 'footer.html' %}

    <script src="{% static 'js/script.js'%}"></script>
  </body>
</html>
